<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Disponibilités BF6 - Team</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="container">
  <h1>Disponibilités Battlefield 6</h1>

  <form id="dispoForm">
    <label>Pseudo</label>
    <input type="text" id="pseudo" required>

    <label>Disponibilités</label>
    <div class="checkboxes">
      <label><input type="checkbox" value="Lundi soir"> Lundi soir</label>
      <label><input type="checkbox" value="Mardi soir"> Mardi soir</label>
      <label><input type="checkbox" value="Mercredi soir"> Mercredi soir</label>
      <label><input type="checkbox" value="Jeudi soir"> Jeudi soir</label>
      <label><input type="checkbox" value="Vendredi soir"> Vendredi soir</label>
      <label><input type="checkbox" value="Samedi soir"> Samedi soir</label>
      <label><input type="checkbox" value="Dimanche soir"> Dimanche soir</label>
    </div>

    <label>Commentaire (optionnel)</label>
    <textarea id="commentaire"></textarea>

    <button type="submit">Envoyer</button>
  </form>

  <p id="status"></p>

  <a href="dispos.html" class="link">Voir les disponibilités</a>
</div>

<script src="assets/main.js"></script>
</body>
</html>
